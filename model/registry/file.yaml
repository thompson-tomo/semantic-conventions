groups:
  - id: registry.file
    prefix: file
    type: attribute_group
    display_name: File Attributes
    brief: "Describes file attributes."
    attributes:
      - id: directory
        type: string
        brief: >
          Directory where the file is located. It should include the drive letter, when appropriate.
        stability: experimental
        examples: ['/home/user', 'C:\Program Files\MyApp']
      - id: extension
        type: string
        brief: >
          File extension, excluding the leading dot.
        stability: experimental
        examples: ['png', 'gz']
        note: >
          When the file name has multiple extensions (example.tar.gz), only the last one should
          be captured ("gz", not "tar.gz").
      - id: name
        type: string
        brief: >
          Name of the file including the extension, without the directory.
        stability: experimental
        examples: ['example.png']
      - id: path
        type: string
        brief: >
          Full path to the file, including the file name. It should include the drive letter, when appropriate.
        stability: experimental
        examples: ['/home/alice/example.png', 'C:\Program Files\MyApp\myapp.exe']
      - id: size
        type: int
        brief: >
          File size in bytes.
        stability: experimental
  - id: registry.file.provider
    prefix: file.provider
    type: attribute_group
    display_name: File Provider Attributes
    brief: "Describes file provider attributes."
    attributes:
      - id: name
        type: string
        brief: >
          What is the provider being used to connect to the file store
        stability: experimental
        examples: ['AzureBlob', 'FTP', 'AWSS3']
      - id: supplier
        type: string
        brief: >
          Who is supplying the provider being used to connect to the file store.
        stability: experimental
        examples: ['Microsoft', 'Google', 'AWS', 'FluentStorage']
  - id: registry.file.store
    prefix: file.store
    type: attribute_group
    display_name: File Store Attributes
    brief: "Describes file store attributes."
    attributes:
      - id: type
        type: string
        brief: >
          What is the type of file store being used.
        stability: experimental
        examples: ['S3', 'FTP', 'LogicalDisk']
      - id: name
        type: string
        brief: >
          What does the supplier call this file store
        stability: experimental
        examples: ['AzureBlob', 'FTP', 'AWSS3']
      - id: supplier
        type: string
        brief: >
          Who is providing the file store.
        stability: experimental
        examples: ['Azure', 'GCP', 'AWS']
      